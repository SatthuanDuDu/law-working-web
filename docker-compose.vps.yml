# VPS deploy with Caddy HTTPS (domain via DOMAIN env)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luat}
      POSTGRES_DB: ${POSTGRES_DB:-luat_work}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luat} -d ${POSTGRES_DB:-luat_work}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 384m

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-luatminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-luatminio123}
    volumes:
      - minio_data:/data
    # Internal only — public via Caddy s3.$DOMAIN
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-luatminio} $${S3_SECRET_KEY:-luatminio123};
      mc mb -p local/$${S3_BUCKET:-luat-attachments} || true;
      mc anonymous set none local/$${S3_BUCKET:-luat-attachments} || true;
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-luatminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-luatminio123}
      S3_BUCKET: ${S3_BUCKET:-luat-attachments}

  app:
    image: luat-work-manager:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-${AUTH_URL}}
      DATABASE_URL: postgresql://${POSTGRES_USER:-luat}:${POSTGRES_PASSWORD:-luat}@db:5432/${POSTGRES_DB:-luat_work}?schema=public
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-luat-attachments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-luatminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-luatminio123}
      S3_REGION: ${S3_REGION:-auto}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
    expose:
      - "3000"
    mem_limit: 768m

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - minio
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
