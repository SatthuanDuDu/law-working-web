services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luat}
      POSTGRES_DB: ${POSTGRES_DB:-luat_work}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luat} -d ${POSTGRES_DB:-luat_work}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-luatminio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-luatminio123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-luatminio} $${S3_SECRET_KEY:-luatminio123};
      mc mb -p local/$${S3_BUCKET:-luat-attachments} || true;
      mc anonymous set none local/$${S3_BUCKET:-luat-attachments} || true;
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-luatminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-luatminio123}
      S3_BUCKET: ${S3_BUCKET:-luat-attachments}

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-luat}:${POSTGRES_PASSWORD:-luat}@db:5432/${POSTGRES_DB:-luat_work}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-luat-attachments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-luatminio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-luatminio123}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
    ports:
      - "${APP_PORT:-3000}:3000"
    profiles:
      - full

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - full

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
